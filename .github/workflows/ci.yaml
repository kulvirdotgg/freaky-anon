name: code-quality-checks

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]

jobs:
  # lint and fomatting quality checks
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome
        run: biome ci .